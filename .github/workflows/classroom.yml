name: Autograding Tests
on:
  push:
    branches:
      - main
  repository_dispatch:
  workflow_dispatch:
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Run Backend Tests
      id: run-backend-tests
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Run Backend Tests
        setup-command: npm ci
        command: npm test
        timeout: 10
        max-score: 100
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        RUN-BACKEND-TESTS_RESULTS: "${{steps.run-backend-tests.outputs.result}}"
      with:
        runners: run-backend-tests
